name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ShareX-Mac.sln

      - name: Build
        run: dotnet build ShareX-Mac.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test ShareXMac.Tests/ShareXMac.Tests.csproj --no-build --configuration Release --verbosity normal
